<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vessel</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0f;--surface:#0f1117;--surface2:#161b27;--surface3:#1e2438;
  --border:#1e2438;--border2:#2a3050;
  --text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
  --accent:#6366f1;--accent2:#818cf8;--accent-dim:#6366f120;
  --green:#22c55e;--green-dim:#22c55e18;
  --red:#ef4444;--red-dim:#ef444418;
  --yellow:#f59e0b;--yellow-dim:#f59e0b18;
  --blue:#3b82f6;--blue-dim:#3b82f618;
  --purple:#a855f7;--purple-dim:#a855f718;
  --r:8px;--r2:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code','Cascadia Code',monospace;
  --sidebar:220px;
}
html[data-theme="light"]{
  --bg:#f1f5f9;--surface:#ffffff;--surface2:#f8fafc;--surface3:#e2e8f0;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--muted:#64748b;--muted2:#475569;
  --accent:#6366f1;--accent2:#4f46e5;--accent-dim:#6366f115;
  --green:#16a34a;--green-dim:#16a34a15;
  --red:#dc2626;--red-dim:#dc262615;
  --yellow:#d97706;--yellow-dim:#d9770615;
  --blue:#2563eb;--blue-dim:#2563eb15;
  --purple:#9333ea;--purple-dim:#9333ea15;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
a{color:var(--accent);text-decoration:none}a:hover{color:var(--accent2)}
button{cursor:pointer;font-family:var(--font);font-size:13px;border:none;border-radius:var(--r);padding:7px 14px;transition:all .15s;font-weight:500;white-space:nowrap}
.btn{background:var(--surface2);color:var(--muted2);border:1px solid var(--border2)}.btn:hover{color:var(--text);border-color:var(--muted)}
.btn-primary{background:var(--accent);color:#fff;border:1px solid transparent}.btn-primary:hover{background:var(--accent2)}
.btn-success{background:#16a34a;color:#fff;border:1px solid transparent}.btn-success:hover{background:#15803d}
.btn-danger{background:transparent;color:var(--red);border:1px solid #ef444430}.btn-danger:hover{background:var(--red-dim)}
.btn-sm{padding:4px 10px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}
input,select,textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:13px;padding:8px 12px;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.fg{margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.tag-running,.tag-active{background:var(--green-dim);color:var(--green)}
.tag-stopped,.tag-exited,.tag-inactive{background:var(--surface3);color:var(--muted)}
.tag-error{background:var(--red-dim);color:var(--red)}
.tag-deploying,.tag-updating{background:var(--yellow-dim);color:var(--yellow)}
.tag-imported{background:var(--blue-dim);color:var(--blue)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;flex-shrink:0}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.editor{font-family:var(--mono);font-size:12px;line-height:1.6;background:#0d1117;border:1px solid var(--border2);border-radius:var(--r);color:#c9d1d9;padding:16px;width:100%;resize:vertical;min-height:300px}
.editor:focus{border-color:var(--accent);outline:none}
html[data-theme="light"] .editor{background:#f8fafc;color:var(--text)}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{padding:9px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text)}.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.stat-sub{font-size:12px;color:var(--muted2);margin-top:4px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px}
.bar-track{flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
.tbl td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--muted2)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface2);color:var(--text)}
.hub-result{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border)}
.hub-result:hover{background:var(--surface2)}
.hub-result:last-child{border-bottom:none}
.img-avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;color:#fff}
</style>
</head>

function ico(name,size,color){
  size=size||16;
  const svg=ICONS[name]||ICONS.box;
  return svg.replace('<svg ','<svg width="'+size+'" height="'+size+'" style="flex-shrink:0'+(color?';color:'+color:'')+'" ');
}
// ── Theme (light / dark) ──────────────────────────────────────────────────────
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('vessel-theme',t);
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')||'dark';
  applyTheme(cur==='dark'?'light':'dark');
  render();
}
(function initTheme(){
  const saved=localStorage.getItem('vessel-theme');
  if(saved){applyTheme(saved);return;}
  const prefersDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(prefersDark?'dark':'light');
})();
// ── Image avatar: Docker Hub logo with colored-initials fallback ──────────────
const HUB_COLORS=['#6366f1','#3b82f6','#22c55e','#f59e0b','#ef4444','#a855f7','#06b6d4','#ec4899'];
function strColor(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffffffff;return HUB_COLORS[Math.abs(h)%HUB_COLORS.length]}
function initials(s){const p=s.replace(/:.*/,'').split('/');const n=p[p.length-1];return n.slice(0,2).toUpperCase()}
// Returns an <img> that falls back to a colored initials div
function imgAvatar(image,size){
  size=size||36;
  if(!image)return'<div class="img-avatar" style="width:'+size+'px;height:'+size+'px;background:var(--surface3);font-size:'+(size*0.38|0)+'px">?</div>';
  const clean=image.split(':')[0];
  const parts=clean.split('/');
  let ns,repo;
  if(parts.length===1){ns='library';repo=parts[0]}
  else{ns=parts[0];repo=parts.slice(1).join('/')}
  const logoUrl='https://hub.docker.com/v2/repositories/'+ns+'/'+repo+'/';
  const bg=strColor(clean);
  const init=initials(clean);
  const id='av-'+clean.replace(/[^a-z0-9]/g,'_')+'_'+size;
  // We fetch the repo metadata to get logo_url; meanwhile show initials
  setTimeout(()=>{
    const el=document.getElementById(id);
    if(!el)return;
    fetch(logoUrl).then(r=>r.json()).then(d=>{
      const logo=d.logo_url&&d.logo_url.large?d.logo_url.large:(d.logo_url&&d.logo_url.small?d.logo_url.small:'');
      if(logo&&el){
        el.outerHTML='<img src="'+logo+'" width="'+size+'" height="'+size+'" style="border-radius:8px;object-fit:contain;background:var(--surface2)" onerror="this.style.display=\'none\'">';
      }
    }).catch(()=>{});
  },0);
  return'<div id="'+id+'" class="img-avatar" style="width:'+size+'px;height:'+size+'px;background:'+bg+';font-size:'+(size*0.38|0)+'px;border-radius:8px">'+init+'</div>';
}

async function api(method,path,body){

    if(localStorage.getItem('vessel-autorefresh')==='1'){

async function load(){

    if(canOperator())requests.push(api('GET','/operations?limit=30'));
    const results=await Promise.all(requests);
    const dc=results[0],dd=results[1],aa=results[2],oo=results[3];
    const next={containers:dc.containers||[],deployments:dd.deployments||[],apps:aa.apps||[],loading:false,selectedOperation:null};
    if(oo){
      next.operations=oo.operations||[];
    }else{

      next.selectedOperation=null;
      next.activeOperationId=null;
    }

      next.nginxStatus=null;

      next.nginxLogs=[];
      next.nginxStats=null;
      next.editingSite=null;
      next.editingContent='';
      next.newSiteMode=false;
    }
    if(S.selectedOperationId){
      const selected=(next.operations||[]).find(op=>op.id===S.selectedOperationId);

    }
    next.page=normalizePage(S.page);

function sleep(ms){return new Promise(resolve=>setTimeout(resolve,ms))}
async function runTracked(method,path,body,opts){
  opts=opts||{};
  const res=await api(method,path,body);
  const op=res&&res.operation?res.operation:null;
  if(!op)return res;
  set({
    page:'operations',
    activeOperationId:op.id,
    selectedOperationId:op.id,
    selectedOperation:op,
  });
  await loadOperations(op.id);
  let finalOp=op;
  for(let i=0;i<900;i++){
    finalOp=await loadOperation(op.id,true);
    if(finalOp&&(finalOp.status==='succeeded'||finalOp.status==='failed'))break;
    await sleep(1250);
  }
  await load();
  await loadOperations(op.id);
  if(finalOp&&finalOp.status==='succeeded'){
    const nextState={activeOperationId:null};
    if(Object.prototype.hasOwnProperty.call(opts,'deploying'))nextState.deploying=opts.deploying;
    if(opts.navigateTo)nextState.page=opts.navigateTo;
    if(opts.resetState)Object.assign(nextState,opts.resetState);
    set(nextState);
    return finalOp;
  }
  set({activeOperationId:null});
  throw new Error(finalOp&&finalOp.error?finalOp.error:(finalOp&&finalOp.summary?finalOp.summary:'Operation failed'));
}

async function deployCustom(e){

  const ports=S.customPorts.filter(p=>p.internal).map(p=>({internal:parseInt(p.internal),external:parseInt(p.external||p.internal),protocol:p.protocol||'tcp'}));
  const volumes=S.customVolumes.filter(v=>v.mount).map(v=>({name:v.name||v.mount.replace(/\//g,'-').replace(/^-/,''),mount_path:v.mount}));
  const image=S.hubSelected?S.hubSelected.slug:f.cimage.value.trim();
  if(!image){set({error:'Image is required'});return}
  const name=f.cname.value.trim();
  if(!name){set({error:'Deployment name is required'});return}
  const domain=f.cdomain.value.trim().toLowerCase();
  if(domain){
    const check=S.dnsCheck&&S.dnsCheck.domain===domain?S.dnsCheck:null;
    if(!check||!check.resolved){set({error:'Custom domain DNS is not ready yet. Add the A record, then use Check DNS before deploying.'});return}
  }
  set({deploying:true,error:null});
  try{
    await runTracked('POST','/docker/deploy',{image,name,domain,ports,volumes,env},{
      navigateTo:'containers',
      deploying:false,
      resetState:{hubSelected:null,hubResults:[],hubQuery:'',customPorts:[{internal:'',external:'',protocol:'tcp'}],customVolumes:[{name:'',mount:''}]}

// ── DNS guidance ──────────────────────────────────────────────────────────────
async function ensureSystemIP(){
  if(S.systemIP!==null)return;
  try{const d=await api('GET','/system/ip');S.systemIP=d.ip||'';}catch{S.systemIP='';}
}
async function checkDNS(domain){
  domain=(domain||'').trim().toLowerCase();
  if(!domain)return;
  S.dnsChecking=true;render();
  try{
    const d=await api('GET','/system/dns?domain='+encodeURIComponent(domain));
    set({dnsCheck:d,dnsChecking:false});
  }catch(e){
    set({dnsCheck:{domain,ips:[],resolved:false,error:e.message},dnsChecking:false});
  }
}
function dnsGuidanceBox(domain){
  if(!domain)return'';
  domain=(domain||'').trim().toLowerCase();
  const ip=S.systemIP||'\u2026';
  const check=S.dnsCheck&&S.dnsCheck.domain===domain?S.dnsCheck:null;
  const ips=check&&check.ips&&check.ips.length?check.ips.join(', '):'';
  const ready=check&&check.resolved;
  const checked=!!check;
  return'<div style="background:var(--blue-dim);border:1px solid var(--blue);border-radius:var(--r);padding:12px 14px;margin-top:8px;font-size:12px">'+
    '<div style="font-weight:600;color:var(--blue);margin-bottom:8px">'+
      ico('globe',13,'var(--blue)')+' DNS & SSL readiness'+
    '</div>'+
    '<div style="color:var(--muted2);margin-bottom:10px">Point this hostname at your Vessel server before deploying. Vessel will enable nginx and then request a Let&rsquo;s Encrypt certificate.</div>'+
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'+
      '<span style="color:var(--muted);width:82px">A record</span>'+
      '<code style="background:var(--surface2);padding:3px 8px;border-radius:4px">'+escHtml(domain)+'</code>'+
      '<span style="color:var(--muted)">to</span>'+
      '<code style="flex:1;background:var(--surface2);padding:3px 8px;border-radius:4px">'+escHtml(ip)+'</code>'+
      '<button class="btn btn-xs" onclick="copyVal(\''+escAttr(ip)+'\',this)">Copy</button>'+
    '</div>'+
    '<div style="display:flex;align-items:center;gap:8px">'+
      '<span style="color:var(--muted);width:82px">Optional CNAME</span>'+
      '<code style="background:var(--surface2);padding:3px 8px;border-radius:4px">www</code>'+
      '<span style="color:var(--muted)">to</span>'+
      '<code style="flex:1;background:var(--surface2);padding:3px 8px;border-radius:4px">'+escHtml(domain)+'</code>'+
      '<button class="btn btn-xs" onclick="copyVal(\''+escAttr(domain)+'\',this)">Copy target</button>'+
    '</div>'+
    '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
      '<button type="button" class="btn btn-xs" onclick="checkDNS(\''+escAttr(domain)+'\')" title="Check public DNS for this hostname">'+(S.dnsChecking?ico('loader',11)+' Checking':'Check DNS')+'</button>'+
      (checked?(ready?
        '<span class="tag tag-running"><span class="dot"></span>DNS found</span><span style="color:var(--muted2)">A record resolves to '+escHtml(ips)+'</span>':
        '<span class="tag tag-error"><span class="dot"></span>DNS not ready</span><span style="color:var(--muted2)">'+escHtml(check.error||'No A record found yet. Wait for propagation, then refresh the check.')+'</span>'):
        '<span style="color:var(--muted2)">Run this check after adding the A record. Certificate issuance waits on DNS.</span>')+
      (checked&&ready&&check.expected_ip&&!check.matches_expected?
        '<span style="color:var(--yellow)">Detected server IP is '+escHtml(check.expected_ip)+'. If this is a private cloud IP, this warning is expected.</span>':'')+
    '</div>'+
  '</div>';
}
function copyVal(val,btn){
  navigator.clipboard.writeText(val).then(()=>{
    const orig=btn.innerHTML;
    btn.innerHTML='Copied';
    setTimeout(()=>{btn.innerHTML=orig;},1500);
  }).catch(()=>{});
}
// ── Deploy wizard navigation ──────────────────────────────────────────────────
function wizardSelectApp(id){
  const app=S.apps.find(a=>a.id===id);
  if(!app)return;
  // Pre-populate env draft with defaults
  const env={};
  if(app.env_vars){app.env_vars.forEach(ev=>{env[ev.key]=ev.default||''});}
  set({deployWizardApp:app,deployWizardEnv:env,deployStep:2});
}
function wizardNext(){
  if(S.deployStep===2&&S.deployWizardDomain){
    const d=S.deployWizardDomain.trim().toLowerCase();
    const check=S.dnsCheck&&S.dnsCheck.domain===d?S.dnsCheck:null;
    if(!check||!check.resolved){
      set({error:'Custom domain DNS is not ready yet. Add the A record, then use Check DNS before continuing.'});
      return;
    }
  }
  if(S.deployStep<3)set({deployStep:S.deployStep+1});
}
function wizardBack(){
  if(S.deployStep>1)set({deployStep:S.deployStep-1});
}
// ── Deploy wizard step 1: template selection grid ────────────────────────────
function wizardTemplatesGrid(){
  const apps = S.apps || [];
  const q = (S.wizardSearchQuery || '').toLowerCase().trim();
  const filtered = apps.filter(a => {
    return (a.name || '').toLowerCase().includes(q) ||
           (a.id || '').toLowerCase().includes(q) ||
           (a.category || '').toLowerCase().includes(q) ||
           (a.description || '').toLowerCase().includes(q);
  });

  if (!filtered.length) {
    return '<div style="grid-column: 1/-1; text-align:center; padding: 40px; color: var(--muted)">No matching templates found</div>';
  }

  // Group apps by category for display
  const categories = [...new Set(filtered.map(a => a.category || 'Other'))].sort();
  let html = '';
  
  categories.forEach(cat => {
    const catApps = filtered.filter(a => (a.category || 'Other') === cat);
    html += '<div style="grid-column: 1/-1; margin-top: 14px; margin-bottom: 8px">'+
      '<div style="font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em">'+escHtml(cat)+'</div>'+
    '</div>';
    
    catApps.forEach(a => {
      const desc = a.description || '';
      html += '<div class="card" style="cursor:pointer; transition:all .15s; padding:10px 12px; display:flex; align-items:center; gap:8px" '+
        'title="'+escAttr(desc)+'" '+
        'onclick="wizardSelectApp(\''+escAttr(a.id)+'\')" '+
        'onmouseenter="this.style.borderColor=\'var(--accent)\';this.style.background=\'var(--surface2)\'" '+
        'onmouseleave="this.style.borderColor=\'\';this.style.background=\'\'">'+
        imgAvatar(a.image, 28)+
        '<div style="min-width:0; flex:1">'+
          '<div style="font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis">'+escHtml(a.name || a.id)+'</div>'+
          '<div style="font-size: 9px; color: var(--accent2); margin-top: 1px">'+escHtml(a.category || '')+'</div>'+
        '</div>'+
      '</div>';
    });
  });
  
  return html;
}

function filterWizardTemplates(q) {
  S.wizardSearchQuery = q;
  const listEl = document.getElementById('wizard-templates-list');
  if (listEl) {
    listEl.innerHTML = wizardTemplatesGrid();
  }
}

// ── Deploy wizard step 2: env var form with DNS guidance ──────────────────────
function toggleWizardService(name, skip) {
  S.deployWizardSkip = S.deployWizardSkip || [];
  if (skip) {
    if (!S.deployWizardSkip.includes(name)) {
      S.deployWizardSkip.push(name);
    }
  } else {
    S.deployWizardSkip = S.deployWizardSkip.filter(x => x !== name);
  }
  // Re-render Step 2
  const container = document.getElementById('wiz-step-container');
  if (container) {
    container.innerHTML = wizardStep2Content();
  }
}

function templateInsights(app){
  const facts=[];
  const vars=app.env_vars||[];
  const services=app.extra_services||[];
  const known={
    umami:['Default first login is usually username admin and password umami. Change it immediately after sign-in.'],
    grafana:['Initial admin username is controlled by GF_SECURITY_ADMIN_USER. Set GF_SECURITY_ADMIN_PASSWORD before deploying.'],
    nextcloud:['The admin account is created from NEXTCLOUD_ADMIN_USER and NEXTCLOUD_ADMIN_PASSWORD on first boot.'],
    keycloak:['The first admin account is created from KEYCLOAK_ADMIN and KEYCLOAK_ADMIN_PASSWORD.'],
    n8n:['Basic auth is enabled by default. Keep N8N_BASIC_AUTH_PASSWORD and N8N_ENCRYPTION_KEY safe because they protect workflows and credentials.'],
    pihole:['The Pi-hole admin panel uses WEBPASSWORD. DNS/ad-blocking templates may need additional network or router configuration after deployment.'],
    gitlab:['The root account uses GITLAB_ROOT_PASSWORD on first boot. GitLab can take several minutes before the web UI is ready.'],
    seafile:['The admin account uses SEAFILE_ADMIN_EMAIL and SEAFILE_ADMIN_PASSWORD.'],
    directus:['The first admin user uses ADMIN_EMAIL and ADMIN_PASSWORD.'],
    appflowy:['The admin account uses APPFLOWY_GOTRUE_ADMIN_EMAIL and APPFLOWY_GOTRUE_ADMIN_PASSWORD.'],
    superset:['The initial admin user is created from ADMIN_USERNAME, ADMIN_EMAIL, and ADMIN_PASSWORD.'],
    mailu:['Mailu needs correct MX/SPF/DKIM/DMARC DNS outside Vessel for real mail delivery.'],
    mailcow:['Mailcow needs correct MX/SPF/DKIM/DMARC DNS outside Vessel for real mail delivery.'],
    plex:['Plex may require a claim token from plex.tv/claim on first deployment.'],
  };
  (known[app.id]||[]).forEach(x=>facts.push(x));
  vars.forEach(ev=>{
    const k=(ev.key||'').toUpperCase();
    if(k.includes('ADMIN')&&k.includes('PASSWORD')){
      facts.push('Set '+ev.key+' now; it becomes the initial admin password for this app.');
    }else if(k.includes('ADMIN')&&(k.includes('USER')||k.includes('EMAIL'))&&ev.default){
      facts.push('Initial admin identity: '+ev.key+' defaults to '+ev.default+'.');
    }else if(ev.secret&&ev.required&&!ev.default){
      facts.push('Generate and save '+ev.key+' before deploying. It may be required for logins, sessions, or stored credentials.');
    }
  });
  if(services.length){
    facts.push('Vessel will also start '+services.length+' sidecar service'+(services.length>1?'s':'')+' for this template: '+services.map(s=>s.name).join(', ')+'.');
  }
  if(app.health_check&&app.health_check.test&&app.health_check.test.length){
    facts.push('Health checks are configured. The app may show as starting until its internal readiness endpoint responds.');
  }
  return [...new Set(facts)].slice(0,6);
}
function onboardingBox(app, facts){
  if(!facts.length)return'';
  return'<div class="card" style="margin-bottom:16px;background:var(--surface2);border-color:var(--border2)">'+
    '<div style="font-weight:600;font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:8px">'+ico('alert-triangle',14,'var(--yellow)')+'First-run notes for '+escHtml(app.name||app.id)+'</div>'+
    '<div style="display:flex;flex-direction:column;gap:7px">'+
      facts.map(f=>'<div style="display:flex;gap:8px;color:var(--muted2);font-size:12px"><span style="color:var(--yellow)">•</span><span>'+escHtml(f)+'</span></div>').join('')+
    '</div>'+
  '</div>';
}

            'onchange="toggleWizardService(\'' + escAttr(s.name) + '\',this.checked)" style="width:auto;margin-top:3px">' +

            '</div>' +

      }).join('') +

  return '<div>' +

    '</div>' +

    '<div class="card" style="margin-bottom:16px">' +
      '<div style="font-weight:600;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:8px">' + ico('settings', 14, 'var(--accent)') + 'Deployment Settings</div>' +
      '<div class="grid2">' +
        '<div class="fg"><label>Deployment Name <span style="color:var(--red)">*</span></label>' +
          '<input placeholder="my-app" pattern="[a-z0-9-]+" title="Lowercase letters, numbers and hyphens only" required ' +
            'value="' + escAttr(S.deployWizardName) + '" oninput="S.deployWizardName=this.value"></div>' +

          '<div id="wiz-dns-box">' + dnsGuidanceBox(S.deployWizardDomain) + '</div>' +

// ── Deploy wizard step 3: review & graphical topology ─────────────────────────
function topologyDiagram(app){
  if(!app)return'';
  const skip=S.deployWizardSkip||[];
  const services=app.extra_services||[];
  const activeSidecars=services.filter(s=>!skip.includes(s.name));
  const hasSidecars=services.length>0;

  const cloudPath = "M 45 95 c -4 -7 -13 -7 -17 0 c -8 -4 -17 2 -15 10 c -5 3 -4 12 2 13 h 30 c 6 -1 7 -10 2 -13 c 1 -4 -4 -9 -12 -10 z";

  let svg = '<svg width="100%" height="200" viewBox="0 0 600 200" style="background:var(--surface2);border-radius:var(--r);border:1px solid var(--border)">'+
    '<defs>'+
      '<marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">'+
        '<path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="var(--muted)" />'+
      '</marker>'+
      '<marker id="arrow-accent" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">'+
        '<path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="var(--accent)" />'+
      '</marker>'+
      '<linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">'+
        '<stop offset="0%" stop-color="var(--accent)" />'+
        '<stop offset="100%" stop-color="var(--accent2)" />'+
      '</linearGradient>'+
    '</defs>';

  svg += '<g class="pulse" style="animation-duration: 3s">'+
    '<path d="'+cloudPath+'" fill="none" stroke="var(--accent)" stroke-width="2" transform="scale(1.5) translate(-2, 10)" />'+
    '<text x="50" y="152" fill="var(--accent)" font-size="10" font-weight="600" text-anchor="middle">CLIENT</text>'+
  '</g>';

  svg += '<path d="M 85 100 L 172 100" stroke="var(--accent)" stroke-width="2" fill="none" marker-end="url(#arrow-accent)" stroke-dasharray="4,4" />';

  svg += '<g>'+
    '<rect x="180" y="50" width="160" height="100" rx="8" fill="url(#primaryGrad)" stroke="var(--accent2)" stroke-width="1" />'+
    '<text x="260" y="85" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">'+escHtml((app.name||app.id).toUpperCase())+'</text>'+
    '<text x="260" y="105" fill="#ffffffb0" font-size="9" font-family="var(--mono)" text-anchor="middle">PRIMARY</text>'+
    '<text x="260" y="128" fill="#ffffff90" font-size="9" font-family="var(--mono)" text-anchor="middle">Port '+(app.proxy_port || 80)+'</text>'+
  '</g>';

  if (!hasSidecars) {
    svg += '<text x="470" y="105" fill="var(--muted)" font-size="11" text-anchor="middle">No sidecars required</text>';
  } else {
    services.forEach((s, idx) => {
      const isSkipped = skip.includes(s.name);
      const boxCount = services.length;
      let boxY = 50;
      let arrowD = "";

      if (boxCount === 1) {
        boxY = 50;
        arrowD = "M 340 100 L 422 100";
      } else if (boxCount === 2) {
        boxY = idx === 0 ? 15 : 110;
        arrowD = idx === 0 ? "M 340 85 L 422 55" : "M 340 115 L 422 145";
      } else {
        const gap = 170 / boxCount;
        boxY = 15 + idx * gap;
        arrowD = "M 340 100 L 422 " + (boxY + 25);
      }

      const boxX = 430;
      const boxW = 140;
      const boxH = boxCount > 2 ? (150 / boxCount) : 75;

      const fill = isSkipped ? 'var(--surface)' : 'var(--surface2)';
      const stroke = isSkipped ? 'var(--border)' : 'var(--border2)';
      const opacity = isSkipped ? '0.4' : '1.0';
      const dash = isSkipped ? 'stroke-dasharray="3,3"' : '';

      svg += '<g opacity="'+opacity+'">'+
        '<rect x="'+boxX+'" y="'+boxY+'" width="'+boxW+'" height="'+boxH+'" rx="6" fill="'+fill+'" stroke="'+stroke+'" stroke-width="1.5" '+dash+' />'+
        '<text x="'+(boxX + 70)+'" y="'+(boxY + (boxH/2) - 4)+'" fill="var(--text)" font-size="11" font-weight="600" text-anchor="middle">'+escHtml(s.name)+'</text>'+
        '<text x="'+(boxX + 70)+'" y="'+(boxY + (boxH/2) + 10)+'" fill="var(--accent2)" font-size="9" font-family="var(--mono)" text-anchor="middle">'+escHtml(s.role || "sidecar")+(isSkipped ? " (skipped)" : "")+'</text>'+
      '</g>';

      const arrowStroke = isSkipped ? 'var(--border)' : 'var(--muted)';
      const arrowDash = isSkipped ? 'stroke-dasharray="3,3"' : '';
      svg += '<path d="'+arrowD+'" stroke="'+arrowStroke+'" stroke-width="1.5" fill="none" marker-end="url(#arrow)" '+arrowDash+' />';
    });
  }

function deployWizard(){
  if (S.deployStep === 1) return wizardStep1();
  if (S.deployStep === 2) return wizardStep2();
  if (S.deployStep === 3) return wizardStep3();
  return '';
}

async function wizardSubmit(){
  const app = S.deployWizardApp;
  if (!app) return;
  const name = S.deployWizardName.trim();
  if (!name) { set({error: 'Deployment name is required'}); return; }
  const domain = S.deployWizardDomain.trim().toLowerCase();
  if(domain){
    const check=S.dnsCheck&&S.dnsCheck.domain===domain?S.dnsCheck:null;
    if(!check||!check.resolved){set({error:'Custom domain DNS is not ready yet. Add the A record, then use Check DNS before deploying.'});return}
  }
  const env = S.deployWizardEnv;
  const skip = S.deployWizardSkip;

  set({deploying: true, error: null});
  try {
    await runTracked('POST', '/deployments', {
      app_id: app.id,
      name,
      domain,
      env,
      skip_services: skip
    },{
      navigateTo:'containers',
      deploying:false,
      resetState:{
        deployStep:1,
        deployWizardApp:null,
        deployWizardEnv:{},
        deployWizardName:'',
        deployWizardDomain:'',
        deployWizardSkip:[]
      }
    });
  } catch (e) {
    set({deploying: false, error: e.message});
  }
}function toggleAutoRefresh(loadFn){
  const next=!S.autoRefreshEnabled;
  if(next){
    if(S.autoRefreshTimer)clearInterval(S.autoRefreshTimer);
    const timer=setInterval(loadFn,5000);
    set({autoRefreshEnabled:true,autoRefreshTimer:timer});
  }else{
    clearInterval(S.autoRefreshTimer);
    set({autoRefreshEnabled:false,autoRefreshTimer:null});
  }
  localStorage.setItem('vessel-autorefresh',next?'1':'0');
}
function stopAutoRefresh(){
  if(S.autoRefreshTimer){
    clearInterval(S.autoRefreshTimer);
    S.autoRefreshTimer=null;
    S.autoRefreshEnabled=false;
  }
}
function autoRefreshToggle(loadFn){
  const on=S.autoRefreshEnabled;
  return'<button class="btn btn-sm'+(on?' btn-primary':'')+'" onclick="toggleAutoRefresh('+loadFn.name+')" title="'+(on?'Disable':'Enable')+' auto-refresh" style="display:flex;align-items:center;gap:5px">'+
    ico('refresh-cw',13)+' '+(on?'Auto-refresh ON':'Auto-refresh OFF')+
  '</button>';
}

function pageContainers(){

  const imported=S.deployments.filter(d=>d.imported);

  S.deployments.forEach(d=>{

  });
  const untracked=S.containers.filter(c=>!c.managed_by_vessel&&!trackedIds.has(c.id)&&!trackedIds.has(c.id.slice(0,12))&&!trackedNames.has(c.name));
  const running=S.containers.filter(c=>c.state==='running').length;

      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:10px;margin-bottom:'+(mb||28)+'px">'+cards+'</div>';
  }
  if(managed.length)h+=section('Vessel Managed',managed.length,managed.map(cardManaged).join(''));
  if(imported.length)h+=section('Monitored',imported.length,imported.map(cardImported).join(''));

function selectApp(id){
  S.selectedApp=id;
  S.templateSkipServices={};S.templateEnvDraft={};
  S.apps.forEach(a=>{const el=document.getElementById('ac-'+a.id);if(el)el.style.borderColor=a.id===id?'var(--accent)':'var(--border)'});
  const app=S.apps.find(a=>a.id===id);
  const fields=document.getElementById('template-config');
  if(fields)fields.innerHTML=templateConfig(app);
}
function templateConfig(app){
  if(!app)return'<div style="background:var(--surface2);border-radius:var(--r);padding:14px 16px;color:var(--muted);font-size:13px">Choose a template to see the Compose plan and configure settings.</div>';
  return servicePlan(app)+envFields(app);
}
function servicePlan(app){
  const services=app.extra_services||[];
  const skipped=S.templateSkipServices||{};
  const managed=services.filter(s=>!skipped[s.name]);
  return'<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:14px">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px">'+
      '<div><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Compose plan</div>'+
      '<div style="font-size:12px;color:var(--muted2);margin-top:4px">Vessel will create '+(1+managed.length)+' service'+(managed.length?'s':'')+': '+escHtml([app.name||app.id].concat(managed.map(s=>s.name)).join(', '))+'</div></div>'+
      '<span class="tag" style="background:var(--blue-dim);color:var(--blue)">'+(1+managed.length)+' services</span>'+
    '</div>'+
    (services.length?services.map(s=>serviceOption(s,skipped[s.name])).join(''):'<div style="font-size:12px;color:var(--muted)">No external services are required for this template.</div>')+
  '</div>';
}
function serviceOption(s,skipped){
  const optional=!!s.optional;
  return'<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-top:1px solid var(--border)">'+
    '<input type="checkbox" name="skip_service_'+escAttr(s.name)+'" value="'+escAttr(s.name)+'" '+(skipped?'checked':'')+' '+(!optional?'disabled':'')+
      ' onchange="toggleTemplateService(\''+escAttr(s.name)+'\',this.checked)" style="width:auto;margin-top:3px">'+
    '<div style="flex:1;min-width:0">'+
      '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
        '<span style="font-weight:600;font-size:13px">'+escHtml(s.name)+'</span>'+
        '<span style="font-size:11px;color:var(--muted);font-family:var(--mono)">'+escHtml(s.image||'')+'</span>'+
        (s.role?'<span class="tag" style="background:var(--surface3);color:var(--muted2)">'+escHtml(s.role)+'</span>':'')+
        (optional?'<span class="tag" style="background:var(--green-dim);color:var(--green)">optional</span>':'')+
      '</div>'+
      '<div style="font-size:12px;color:var(--muted);margin-top:4px">'+
        (optional?(skipped?'Skipped. Fill the matching environment fields below with your external host, URL, or credentials.':'Check to skip the Vessel-managed '+escHtml(s.role||'service')+' and use an external one.'):'Required for this template.')+
      '</div>'+
    '</div>'+
  '</div>';
}
function toggleTemplateService(name,skip){
  S.templateEnvDraft=collectTemplateEnvDraft();
  S.templateSkipServices=S.templateSkipServices||{};
  if(skip)S.templateSkipServices[name]=true;else delete S.templateSkipServices[name];
  const app=S.apps.find(a=>a.id===S.selectedApp);
  const fields=document.getElementById('template-config');
  if(fields)fields.innerHTML=templateConfig(app);
}
function collectTemplateEnvDraft(){
  const draft={};
  document.querySelectorAll('[name^="env_"]').forEach(el=>{draft[el.name.slice(4)]=el.value});
  return draft;
}
function envFields(app){
  const vars=app.env_vars||[];
  if(!vars.length)return'';
  return'<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px">'+
    '<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Configuration</div>'+
    vars.map(e=>{
      const id='env_'+e.key;
      const type=e.secret?'password':'text';
      const val=escAttr((S.templateEnvDraft&&Object.prototype.hasOwnProperty.call(S.templateEnvDraft,e.key))?S.templateEnvDraft[e.key]:(e.default||''));
      return'<div class="fg" style="margin-bottom:12px">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px">'+
          '<label style="margin-bottom:5px">'+e.key+(e.required?' *':'')+'</label>'+
          (e.secret?'<button type="button" class="btn btn-xs" onclick="genSecret(\''+id+'\')">Generate</button>':'')+
        '</div>'+
        '<input id="'+id+'" name="'+id+'" type="'+type+'" value="'+val+'" placeholder="'+escAttr(e.description||e.key)+'" '+(e.required?'required':'')+'>'+
        (e.description?'<div style="font-size:11px;color:var(--muted);margin-top:4px">'+escHtml(e.description)+'</div>':'')+
      '</div>';
    }).join('')+
  '</div>';
}
function genSecret(id){
  const el=document.getElementById(id);if(!el)return;
  const bytes=new Uint8Array(32);crypto.getRandomValues(bytes);
  el.value=Array.from(bytes).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function roleRank(r){return{viewer:10,operator:20,admin:30,owner:40}[r]||0}
function canOperator(){return S.currentUser&&roleRank(S.currentUser.role)>=20}
function canAdmin(){return S.currentUser&&roleRank(S.currentUser.role)>=30}
async function createUser(e){
  e.preventDefault();const f=e.target;
  try{
    await api('POST','/users',{username:f.username.value,role:f.role.value,password:f.password.value});
    f.reset();f.role.value='viewer';await loadUsers();
  }catch(err){set({error:err.message})}
}
async function updateUser(id){
  const role=document.getElementById('role-'+id).value;
  const password=document.getElementById('pw-'+id).value;
  try{await api('PUT','/users/'+id,{role,password});await loadUsers()}catch(err){set({error:err.message})}
}
async function deleteUser(id,name){
  if(!confirm('Delete user "'+name+'"?'))return;
  try{await api('DELETE','/users/'+id);await loadUsers()}catch(err){set({error:err.message})}
}

function addSidecarPort(i){
  S.csSidecars[i].ports=S.csSidecars[i].ports||[];
  S.csSidecars[i].ports.push({internal:'',external:'',protocol:'tcp'});
  render();
}
function removeSidecarPort(i,j){
  S.csSidecars[i].ports.splice(j,1);
  render();
}
function updateSidecarPort(i,j,field,val){
  S.csSidecars[i].ports=S.csSidecars[i].ports||[];
  if(!S.csSidecars[i].ports[j])S.csSidecars[i].ports[j]={internal:'',external:'',protocol:'tcp'};

async function deployComposeStack(e){
  e.preventDefault();
  const name=S.csName.trim();
  if(!name){set({error:'Stack name is required'});return}
  if(S.csDomain){
    const d=S.csDomain.trim().toLowerCase();
    const check=S.dnsCheck&&S.dnsCheck.domain===d?S.dnsCheck:null;
    if(!check||!check.resolved){set({error:'Custom domain DNS is not ready yet. Add the A record, then use Check DNS before deploying.'});return}
  }
  const image=S.csPrimaryImage.trim();
  if(!image){set({error:'Primary image is required'});return}
  const primaryEnv={};
  (S.csPrimaryEnv||'').trim().split('\n').forEach(l=>{const i=l.indexOf('=');if(i>0)primaryEnv[l.slice(0,i).trim()]=l.slice(i+1).trim()});
  const ports=S.csPrimaryPorts.filter(p=>p.internal).map(p=>({internal:parseInt(p.internal),external:parseInt(p.external||p.internal),protocol:p.protocol||'tcp'}));
  const volumes=S.csPrimaryVolumes.filter(v=>v.mount).map(v=>({name:v.name||v.mount.replace(/\//g,'-').replace(/^-/,''),mount_path:v.mount}));
  const primary={name:S.csPrimaryName.trim()||name,image,ports,volumes,environment:primaryEnv};
  const sidecars=S.csSidecars.map(s=>{
    const env={};
    (s.env||'').trim().split('\n').forEach(l=>{const i=l.indexOf('=');if(i>0)env[l.slice(0,i).trim()]=l.slice(i+1).trim()});
    const vols=(s.volumes||[]).filter(v=>v.mount).map(v=>({name:v.name||v.mount.replace(/\//g,'-').replace(/^-/,''),mount_path:v.mount}));
    const sidePorts=(s.ports||[]).filter(p=>p.internal).map(p=>({internal:parseInt(p.internal),external:parseInt(p.external||p.internal),protocol:p.protocol||'tcp'}));
    const sc={name:s.name,image:s.image,environment:env,volumes:vols,ports:sidePorts};
    if(s.healthTest&&s.healthTest.trim()){
      const parts=s.healthTest.trim().split(/\s+/);
      sc.health_check={test:parts,interval:'10s',timeout:'5s',retries:5};
    }
    return sc;
  }).filter(s=>s.name&&s.image);
  set({deploying:true,error:null});
  try{
    await runTracked('POST','/deployments/compose',{name,domain:S.csDomain,primary,sidecars,env:primaryEnv},{
      navigateTo:'compose',
      deploying:false,
      resetState:{csName:'',csDomain:'',csPrimaryImage:'',csPrimaryName:'',
        csPrimaryPorts:[{internal:'',external:'',protocol:'tcp'}],
        csPrimaryVolumes:[{name:'',mount:''}],csPrimaryEnv:'',csSidecars:[]}
    });
    loadComposeStacks();
  }catch(err){set({deploying:false,error:err.message})}
}

    stats.top_ips.map(ip=>'<div class="bar-row">'+
      '<span style="min-width:140px;color:var(--muted2);font-family:var(--mono);font-size:11px">'+ip.ip+'</span>'+

    '<div style="color:var(--muted);font-size:13px;padding:20px 0">No data yet</div>';
  const codes=stats.status_codes||{};
  const codeRows=Object.entries(codes).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([code,count])=>
    '<tr><td><span style="color:'+statusColor(code)+';font-family:var(--mono);font-weight:600">'+code+'</span></td>'+

    '<tr><td><span style="font-family:var(--mono);font-size:12px">'+s.name+'</span></td>'+
    '<td><span style="color:var(--accent2)">'+escHtml(s.server_name||'—')+'</span></td>'+
    '<td>'+escHtml(s.upstream||'—')+'</td><td>'+escHtml(s.port||'80')+'</td>'+
    '<td>'+(s.enabled?'<span class="tag tag-active">enabled</span>':'<span class="tag tag-stopped">disabled</span>')+'</td></tr>').join(''):
    '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:20px">No sites configured</td></tr>';
  const recentRows=(stats.recent_requests||[]).slice(0,15).map(r=>
    '<tr><td style="font-family:var(--mono);font-size:11px;color:var(--muted)">'+r.ip+'</td>'+

    '<td style="font-family:var(--mono);font-size:11px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escHtml(r.path)+'</td>'+

    '<td style="color:var(--muted);font-size:11px">'+r.size+' B</td></tr>').join('');
  return cards+
    '<div class="grid2" style="margin-bottom:24px">'+
      '<div class="card"><div style="font-weight:600;margin-bottom:16px;font-size:13px">Top Paths</div>'+pathsHtml+'</div>'+
      '<div class="card"><div style="font-weight:600;margin-bottom:16px;font-size:13px">Top Client IPs</div>'+ipsHtml+
        '<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">'+
          '<div style="font-weight:600;margin-bottom:12px;font-size:13px">Status Codes</div>'+
          '<table class="tbl"><thead><tr><th>Code</th><th style="text-align:right">Count</th><th style="text-align:right">%</th></tr></thead><tbody>'+codeRows+'</tbody></table>'+
        '</div></div>'+
    '</div>'+
    '<div class="card" style="margin-bottom:24px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
        '<div style="font-weight:600;font-size:13px">Active Sites</div>'+
        '<button class="btn btn-sm" onclick="set({nginxTab:\'sites\'})">Manage →</button></div>'+
      '<table class="tbl"><thead><tr><th>Config</th><th>Domain</th><th>Upstream</th><th>Port</th><th>Status</th></tr></thead><tbody>'+sitesRows+'</tbody></table>'+
    '</div>'+
    '<div class="card">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
        '<div style="font-weight:600;font-size:13px">Recent Requests</div>'+
        '<button class="btn btn-sm" onclick="set({nginxTab:\'logs\'})">View Logs →</button></div>'+
      (recentRows?'<table class="tbl"><thead><tr><th>IP</th><th>Method</th><th>Path</th><th>Status</th><th>Size</th></tr></thead><tbody>'+recentRows+'</tbody></table>':
        '<div style="color:var(--muted);font-size:13px;padding:20px 0;text-align:center">No recent requests in log</div>')+
    '</div>';
}

          '<div class="fg"><label>Server Name *</label><input name="server_name" placeholder="app.example.com" required></div>'+
        '</div>'+

          '<div class="fg"><label>Listen Port</label><input name="port" type="number" value="80"></div>'+

function pageSettings(){
  function row(l,v){return'<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted);font-size:13px">'+l+'</span><code style="font-family:var(--mono);font-size:12px;color:var(--accent2)">'+v+'</code></div>'}
  const upd=S.updateLog!==undefined;
  const updateCard='<div class="card" style="margin-bottom:24px">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'+
      '<div>'+
        '<div style="font-weight:700;font-size:15px">Update Vessel</div>'+
        '<div style="font-size:12px;color:var(--muted);margin-top:3px">Pulls the latest release binary from GitHub and restarts the service</div>'+
      '</div>'+
      '<button class="btn-primary btn-sm" onclick="startUpdate()" style="display:flex;align-items:center;gap:6px"'+(S.updating?' disabled':'')+'>'+
        (S.updating?ico('loader',13)+' Updating…':ico('refresh-cw',13)+' Update Now')+'</button>'+
    '</div>'+
    (S.updateLog!==null&&S.updateLog!==undefined?
      '<pre id="update-log" style="font-family:var(--mono);font-size:12px;background:#0d1117;border:1px solid var(--border2);border-radius:var(--r);padding:14px;max-height:260px;overflow-y:auto;color:#a8b4c8;line-height:1.6;white-space:pre-wrap;word-break:break-all">'+escHtml(S.updateLog)+'</pre>':'')+
  '</div>';
  return'<div>'+
    '<div style="margin-bottom:24px"><h1 style="font-size:22px;font-weight:700;letter-spacing:-.5px">Settings</h1></div>'+
    updateCard+
    '<div class="card" style="margin-bottom:24px">'+
      row('Signed in as',escHtml((S.currentUser&&S.currentUser.username)||''))+
      row('Role',escHtml((S.currentUser&&S.currentUser.role)||''))+
      row('Version',escHtml(S.serverVersion||'—'))+row('Data directory','/var/lib/vessel')+
      row('Config file','/etc/vessel/config.yaml')+row('UI port','4800')+
      '<div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border);display:flex;gap:10px">'+
        '<a href="https://github.com/Yash121l/Vessel" target="_blank" class="btn btn-sm" style="display:flex;align-items:center;gap:6px">'+ico('github',13)+' View on GitHub</a>'+
      '</div>'+
    '</div>'+
    (canAdmin()?usersPanel():'')+
  '</div>';
}
async function startUpdate(){
  if(S.updating)return;
  if(!confirm('Update Vessel to the latest release?\n\nThe service will restart automatically. You may need to refresh the page after ~10 seconds.'))return;
  set({updating:true,updateLog:'Connecting…\n'});
  const es=new EventSource(API+'/system/update');
  es.onmessage=e=>{
    if(e.data==='__DONE__'){
      es.close();
      set({updating:false,updateLog:(S.updateLog||'')+'Done. Refreshing in 8s…\n'});
      setTimeout(()=>location.reload(),8000);
      return;
    }
    S.updateLog=(S.updateLog||'')+e.data+'\n';
    const el=document.getElementById('update-log');
    if(el){el.textContent=S.updateLog;el.scrollTop=el.scrollHeight;}
  };
  es.onerror=()=>{
    es.close();
    // If the server restarted, the SSE connection will drop — that's expected
    if(S.updating){
      set({updating:false,updateLog:(S.updateLog||'')+'Connection closed (service may be restarting).\nRefreshing in 8s…\n'});
      setTimeout(()=>location.reload(),8000);
    }
  };
}
function usersPanel(){
  const roles=['viewer','operator','admin'].concat(S.currentUser&&S.currentUser.role==='owner'?['owner']:[]);
  const roleOptions=(selected)=>roles.map(r=>'<option value="'+r+'"'+(selected===r?' selected':'')+'>'+r+'</option>').join('');
  const rows=(S.users||[]).map(u=>{
    const self=S.currentUser&&u.id===S.currentUser.id;
    const editable=!self&&(S.currentUser.role==='owner'||u.role!=='owner');
    return'<tr>'+
      '<td><span style="font-weight:600">'+escHtml(u.username)+'</span>'+(self?' <span class="tag tag-active">you</span>':'')+'</td>'+
      '<td>'+(editable?'<select id="role-'+u.id+'" style="width:120px">'+roleOptions(u.role)+'</select>':'<span class="tag tag-imported">'+escHtml(u.role)+'</span>')+'</td>'+
      '<td style="max-width:220px">'+(editable?'<input id="pw-'+u.id+'" type="password" placeholder="New password" autocomplete="new-password">':'')+'</td>'+
      '<td style="text-align:right">'+(editable?'<button class="btn btn-sm" onclick="updateUser(\''+u.id+'\')">Save</button> <button class="btn-danger btn-sm" onclick="deleteUser(\''+u.id+'\',\''+escAttr(u.username)+'\')">Delete</button>':'')+'</td>'+
    '</tr>';
  }).join('');
  return'<div class="card">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
      '<div><div style="font-weight:700;font-size:15px">Users & Permissions</div>'+
      '<div style="font-size:12px;color:var(--muted);margin-top:3px">Viewer can inspect, operator can deploy/manage apps, admin can manage host settings, owner can manage every role.</div></div>'+
      '<button class="btn btn-sm" onclick="loadUsers()">Refresh</button></div>'+
    '<form onsubmit="createUser(event)" style="display:grid;grid-template-columns:1fr 130px 1fr auto;gap:8px;margin-bottom:18px">'+
      '<input name="username" placeholder="username" autocomplete="off" required>'+
      '<select name="role">'+roleOptions('viewer')+'</select>'+
      '<input name="password" type="password" placeholder="temporary password" autocomplete="new-password" required>'+
      '<button class="btn-primary">Add User</button>'+
    '</form>'+
    '<table class="tbl"><thead><tr><th>User</th><th>Role</th><th>Password</th><th></th></tr></thead><tbody>'+
      (rows||'<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:18px">No users loaded</td></tr>')+
    '</tbody></table>'+
  '</div>';
}
// ── Boot ──────────────────────────────────────────────────────────────────────
render();boot();
</script>
