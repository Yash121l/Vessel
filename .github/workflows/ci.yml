name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download modules
        run: GOFLAGS="-mod=mod" CGO_ENABLED=0 go mod download

      - name: Build
        run: GOFLAGS="-mod=mod" CGO_ENABLED=0 go build -ldflags="-s -w" ./...

      - name: Vet
        run: GOFLAGS="-mod=mod" CGO_ENABLED=0 go vet ./...
