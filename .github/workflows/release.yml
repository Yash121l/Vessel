name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download modules
        run: GOFLAGS="-mod=mod" CGO_ENABLED=0 go mod download

      - name: Build release binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X github.com/Yash121l/Vessel/internal/cli.Version=${VERSION}"
          mkdir -p dist

          CGO_ENABLED=0 GOFLAGS="-mod=mod" GOOS=linux GOARCH=amd64 \
            go build -ldflags="$LDFLAGS" -o dist/vessel_linux_amd64 .

          CGO_ENABLED=0 GOFLAGS="-mod=mod" GOOS=linux GOARCH=arm64 \
            go build -ldflags="$LDFLAGS" -o dist/vessel_linux_arm64 .

          CGO_ENABLED=0 GOFLAGS="-mod=mod" GOOS=linux GOARCH=arm GOARM=7 \
            go build -ldflags="$LDFLAGS" -o dist/vessel_linux_armv7 .

          # Stamp the correct version into install.sh
          sed -i "s/VESSEL_VERSION:-0.1.0/VESSEL_VERSION:-${VERSION}/" install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vessel_linux_amd64
            dist/vessel_linux_arm64
            dist/vessel_linux_armv7
            install.sh
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            curl -sSL https://raw.githubusercontent.com/Yash121l/Vessel/${{ github.ref_name }}/install.sh | sudo bash
            ```

            ## Binaries

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `vessel_linux_amd64` |
            | Linux ARM64 | `vessel_linux_arm64` |
            | Linux ARMv7 | `vessel_linux_armv7` |
