name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.1)'
        required: true
        default: 'v0.1.1'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: GOFLAGS="-mod=mod" CGO_ENABLED=0 go mod download

      - name: Build release binaries
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"

          LDFLAGS="-s -w -X github.com/Yash121l/Vessel/internal/cli.Version=${VERSION}"
          mkdir -p dist

          CGO_ENABLED=0 GOFLAGS="-mod=mod" GOOS=linux GOARCH=amd64 \
            go build -ldflags="$LDFLAGS" -o dist/vessel_linux_amd64 .

          CGO_ENABLED=0 GOFLAGS="-mod=mod" GOOS=linux GOARCH=arm64 \
            go build -ldflags="$LDFLAGS" -o dist/vessel_linux_arm64 .

          CGO_ENABLED=0 GOFLAGS="-mod=mod" GOOS=linux GOARCH=arm GOARM=7 \
            go build -ldflags="$LDFLAGS" -o dist/vessel_linux_armv7 .

          # Stamp the correct version into install.sh
          sed -i "s/VESSEL_VERSION:-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/VESSEL_VERSION:-${VERSION}/" install.sh

          echo "RELEASE_TAG=${TAG}" >> $GITHUB_ENV
          echo "RELEASE_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Collect release metrics
        run: |
          scripts/collect-ci-metrics.sh \
            --mode release \
            --version "${RELEASE_VERSION}" \
            --dist-dir dist \
            --primary-binary dist/vessel_linux_amd64 \
            --output-dir release-metrics

      - name: Publish release metrics summary
        if: always()
        run: |
          if [ -f release-metrics/summary.md ]; then
            cat release-metrics/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload release metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-metrics-${{ env.RELEASE_TAG }}
          path: release-metrics
          if-no-files-found: ignore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/vessel_linux_amd64
            dist/vessel_linux_arm64
            dist/vessel_linux_armv7
            install.sh
            release-metrics/summary.md
            release-metrics/metrics.json
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            curl -sSL https://raw.githubusercontent.com/Yash121l/Vessel/${{ env.RELEASE_TAG }}/install.sh | sudo bash
            ```

            ## Binaries

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `vessel_linux_amd64` |
            | Linux ARM64 | `vessel_linux_arm64` |
            | Linux ARMv7 | `vessel_linux_armv7` |
