name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests
        run: GOFLAGS="-mod=mod" go test ./... -race -timeout 60s

      - name: Build binaries
        run: GOFLAGS="-mod=mod" make release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vessel_linux_amd64
            dist/vessel_linux_arm64
            dist/vessel_linux_armv7
            install.sh
          generate_release_notes: true
