id: plausible
name: Plausible Analytics
description: Lightweight, privacy-friendly alternative to Google Analytics
category: Analytics
icon: "📉"
version: v2
image: ghcr.io/plausible/community-edition:v2
proxy_port: 8000

ports:
  - internal: 8000
    external: 8000
    protocol: tcp

env_vars:
  - key: BASE_URL
    description: Your public URL (e.g. https://analytics.example.com) — required for email and invites
    default: ""
    required: true
  - key: SECRET_KEY_BASE
    description: 64-character random secret (generate with openssl rand -hex 64)
    default: ""
    required: true
    secret: true
  - key: DATABASE_URL
    description: PostgreSQL connection string
    default: postgres://plausible:plausible_password@plausible-db:5432/plausible
    required: false
  - key: CLICKHOUSE_DATABASE_URL
    description: ClickHouse connection string for event storage
    default: http://plausible-events-db:8123/plausible_events_db
    required: false
  - key: MAILER_EMAIL
    description: From address for transactional emails
    default: hello@plausible.local
    required: false

health_check:
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/api/health"]
  interval: 30s
  timeout: 10s
  retries: 5

extra_services:
  - name: plausible-db
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: plausible
      POSTGRES_USER: plausible
      POSTGRES_PASSWORD: plausible_password
    volumes:
      - name: plausible-db-data
        mount_path: /var/lib/postgresql/data
        description: PostgreSQL data
    health_check:
      test: ["CMD-SHELL", "pg_isready -U plausible"]
      interval: 10s
      timeout: 5s
      retries: 5

  - name: plausible-events-db
    image: clickhouse/clickhouse-server:23.3-alpine
    volumes:
      - name: plausible-events-data
        mount_path: /var/lib/clickhouse
        description: ClickHouse event data
      - name: plausible-events-logs
        mount_path: /var/log/clickhouse-server
        description: ClickHouse logs
