id: gitea
name: Gitea
description: Lightweight self-hosted Git service
category: Development
icon: "🍵"
version: latest
image: gitea/gitea:latest
proxy_port: 3000

ports:
  - internal: 3000
    external: 3000
    protocol: tcp
  - internal: 22
    external: 2222
    protocol: tcp

volumes:
  - name: gitea-data
    mount_path: /data
    description: Gitea repositories, configuration, and data

env_vars:
  - key: GITEA__database__DB_TYPE
    description: "Database type: sqlite3, postgres, or mysql"
    default: sqlite3
    required: false
  - key: GITEA__database__HOST
    description: Database host (when not using sqlite3)
    default: gitea-db:5432
    required: false
  - key: GITEA__database__NAME
    description: Database name
    default: gitea
    required: false
  - key: GITEA__database__USER
    description: Database username
    default: gitea
    required: false
  - key: GITEA__database__PASSWD
    description: Database password
    default: gitea_password
    required: false
    secret: true
  - key: GITEA__server__DOMAIN
    description: Domain name for Gitea
    default: ""
    required: false
  - key: GITEA__server__ROOT_URL
    description: Full public URL
    default: ""
    required: false
  - key: GITEA__server__SSH_DOMAIN
    description: Domain for SSH cloning
    default: ""
    required: false
  - key: USER_UID
    description: UID for the git user
    default: "1000"
    required: false
  - key: USER_GID
    description: GID for the git user
    default: "1000"
    required: false

health_check:
  test: ["CMD", "curl", "-f", "http://localhost:3000"]
  interval: 30s
  timeout: 10s
  retries: 5

extra_services:
  - name: gitea-db
    image: postgres:15-alpine
    optional: true
    role: database
    environment:
      POSTGRES_DB: gitea
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: gitea_password
    volumes:
      - name: gitea-db-data
        mount_path: /var/lib/postgresql/data
        description: PostgreSQL data
    health_check:
      test: ["CMD-SHELL", "pg_isready -U gitea"]
      interval: 10s
      timeout: 5s
      retries: 5
